<div class="app-layout">
  <div class="map-wrapper">
    <div class="map-container" id="mapContainer">
      <img id="park-map" src="Map_J.webp" alt="Window on World Theme Park 導覽圖">
    </div>
    <div class="zoom-controls">
      <button onclick="zoomIn()" aria-label="放大地圖">＋</button>
      <button onclick="zoomOut()" aria-label="縮小地圖">－</button>
    </div>
  </div>
  <nav class="bottom-nav">
    <a href="https://wow.com.tw/tw/about/features.aspx?kind=28" target="_blank">遊世界</a>
    <a href="https://wow.com.tw/tw/about/features.aspx?kind=29" target="_blank">遊樂園</a>
    <a href="https://www.facebook.com/wow.themepark" target="_blank">Facebook</a>
    <a href="https://www.instagram.com/wow.themepark/" target="_blank">IG</a>
    <a href="https://www.youtube.com/channel/UCotlEpo1eWzJytglZjp7yEQ" target="_blank">YouTube</a>
  </nav>
</div>

<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  .app-layout { display: flex; flex-direction: column; height: 100vh; }
  .map-wrapper { position: relative; width: 100%; flex: 1; overflow: hidden; }
  .map-container { width: 100%; height: 100%; overflow: auto; background-color: #fcebd1; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  #park-map { width: 250%; max-width: none; display: block; transform-origin: 0 0; }
  .zoom-controls { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 16px; z-index: 10; }
  .zoom-controls button { width: 80px; height: 80px; border-radius: 50%; border: none; background-color: rgba(255, 255, 255, 0.95); box-shadow: 0 6px 16px rgba(0,0,0,0.3); font-size: 40px; font-weight: bold; color: #222; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; }
  .zoom-controls button:active { background-color: #e0e0e0; transform: scale(0.95); }
  .bottom-nav { height: 80px; background-color: #ffffff; border-top: 2px solid #ddd; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -4px 10px rgba(0,0,0,0.08); z-index: 100; }
  .bottom-nav a { text-decoration: none; color: #222; font-size: 20px; font-weight: 900; text-align: center; flex: 1; padding: 15px 0; }
  .bottom-nav a:active, .bottom-nav a:hover { color: #e60012; }
</style>

<script>
  const container = document.getElementById('mapContainer'); const img = document.getElementById('park-map');
  let currentZoom = 250; const minZoom = 100; const maxZoom = 450; const step = 50;
  window.onload = function() { setTimeout(() => { centerToCoordinates(0.50, 0.68); }, 300); };
  function zoomIn() { if (currentZoom < maxZoom) { currentZoom += step; updateMapZoom(); } }
  function zoomOut() { if (currentZoom > minZoom) { currentZoom -= step; updateMapZoom(); } }
  function updateMapZoom() {
    const centerX = (container.scrollLeft + container.clientWidth / 2) / img.clientWidth;
    const centerY = (container.scrollTop + container.clientHeight / 2) / img.clientHeight;
    container.style.scrollBehavior = 'auto'; img.style.width = currentZoom + '%';
    const newX = (img.clientWidth * centerX) - (container.clientWidth / 2);
    const newY = (img.clientHeight * centerY) - (container.clientHeight / 2);
    container.scrollTo(newX, newY);
    setTimeout(() => { container.style.scrollBehavior = 'smooth'; }, 50);
  }
  function centerToCoordinates(pctX, pctY) {
    const targetX = (img.clientWidth * pctX) - (container.clientWidth / 2);
    const targetY = (img.clientHeight * pctY) - (container.clientHeight / 2);
    container.scrollTo({ left: targetX, top: targetY, behavior: 'smooth' });
  }
</script>
